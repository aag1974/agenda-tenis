services:
  - type: web
    name: agenda-tenis-integrado
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node backend/server.js
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: SESSION_SECRET
        generateValue: true
      - key: PORT
        value: 10000
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
